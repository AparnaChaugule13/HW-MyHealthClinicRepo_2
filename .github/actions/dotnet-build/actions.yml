# .github/actions/dotnet-build/action.yml
name: Dotnet Build
description: Reusable .NET build action
inputs:
  project-path:
    description: 'Path to the .csproj or .sln file'
    required: true

runs:
  using: "composite"
  steps:
    - name: Set up .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: Restore dependencies
      run: dotnet restore ${{ inputs.project-path }}

    - name: Build
      run: dotnet build ${{ inputs.project-path }} --configuration Release --no-restore
